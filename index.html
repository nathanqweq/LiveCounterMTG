<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb bg-orb--one"></div>
  <div class="bg-orb bg-orb--two"></div>

  <div id="lobby" class="center">
    <div class="container">
      <p class="eyebrow">Live Counter</p>
      <h1>Commander Tracker</h1>
      <p class="hero-copy">Entre em uma sala, acompanhe a mesa e controle vida com uma interface mais limpa para partidas de Commander.</p>

      <input id="name" placeholder="Seu nome" />
      <input id="room" placeholder="ID da sala" />

      <div class="lobby-actions">
        <button id="createRoomButton" onclick="createRoom()">Criar Sala</button>
        <button id="joinRoomButton" onclick="joinRoom()">Entrar na Sala</button>
      </div>
    </div>
  </div>

  <div id="game" class="hidden">
    <div class="top">
      Sala: <span id="roomCode"></span>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
